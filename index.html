

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #191127, #045e79);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .dashboard {
      width: 100%; max-width: 900px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.2);
    }
    h1 { 
      font-size: 32px; 
      margin-bottom: 10px; 
    }
    .subtitle { 
      color: #e5e7eb; 
      margin-bottom: 24px; 
    }
    .grid { 
      display: grid;   
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
      gap: 16px; 
    }
    .card {
      display: block;
      text-decoration: none;
      background: #ffffff;
      color: #111827;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(0,0,0,0.2); }
    .card h3 { margin-bottom: 8px; }
    .card p { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>Quiz Dashboard</h1>
    <p class="subtitle">Choose a topic and start a fresh quiz session.</p>
    <div class="grid">
      <a class="card" href="html.html"><h3>HTML</h3><p>Structure and tags</p></a>
      <a class="card" href="css.html"><h3>CSS</h3><p>Styling essentials</p></a>
      <a class="card" href="javascript.html"><h3>JavaScript</h3><p>Core programming basics</p></a>
      <a class="card" href="react.html"><h3>React</h3><p>Component-based UI</p></a>
    </div>
  </div>
</body>
</html>
